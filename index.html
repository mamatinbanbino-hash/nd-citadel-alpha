<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ND-CITADEL | ALPHA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --neon: #00ffcc; 
            --dark: #050505; 
            --yellow: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Segoe UI', sans-serif; color: white; 
        }

        /* HUD */
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; padding: 20px; box-sizing: border-box; 
        }

        .stat-panel { 
            background: rgba(0,0,0,0.85); border-left: 4px solid var(--neon); 
            padding: 15px; width: fit-content; pointer-events: auto;
            display: flex; align-items: center; gap: 15px;
        }

        .logo-nd { width: 50px; height: 50px; border: 1px solid var(--neon); }

        /* CONTROLES */
        #joy-container { 
            position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px; 
            background: rgba(255,255,255,0.05); border-radius: 50%; 
            border: 1px solid var(--neon); pointer-events: auto; touch-action: none; 
        }
        #joy-stick { 
            position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; 
            background: var(--neon); border-radius: 50%; box-shadow: 0 0 20px var(--neon); 
        }

        #action-btn {
            position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px;
            background: rgba(255, 0, 0, 0.2); border: 2px solid red; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; font-weight: bold; color: white; cursor: pointer;
        }

        #chat-box {
            position: absolute; bottom: 180px; left: 20px; width: 280px;
            height: 100px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon);
            padding: 10px; font-size: 12px; color: var(--neon); overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-panel">
            <img src="image_2.png" alt="Logo ND" class="logo-nd">
            <div>
                <div style="font-size: 18px;">ADAMA <span style="font-size: 10px; color: var(--neon);">[CORE]</span></div>
                <div style="font-size: 14px;">XP: <span id="xp-val">0</span> | LVL: 1</div>
            </div>
        </div>
    </div>

    <div id="chat-box">
        [SYSTEM] Chargement de Macassi...<br>
        [SYSTEM] Moteur ND-Z prêt.
    </div>

    <div id="joy-container"><div id="joy-stick"></div></div>
    <div id="action-btn" onclick="triggerAction()">ACTION</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="script.js"></script>

    <script>
        // Ce petit code vérifie que tout est lié
        function triggerAction() {
            if(window.gameAction) {
                window.gameAction();
            } else {
                console.log("Action locale : En attente du moteur...");
            }
        }
    </script>
</body>
</html>
